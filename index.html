<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 추첨기</title>
  <style>
    :root[data-theme="dark"] {
      --bg: linear-gradient(135deg, #0f172a 0%, #1d4ed8 100%);
      --card-bg: rgba(15, 23, 42, 0.95);
      --card-border: rgba(148, 163, 184, 0.2);
      --text: #f8fafc;
      --text-sub: #cbd5e1;
      --text-footer: #94a3b8;
      --btn-bg: #38bdf8;
      --btn-color: #0f172a;
      --btn-shadow: rgba(56, 189, 248, 0.25);
      --btn-shadow-hover: rgba(56, 189, 248, 0.35);
      --toggle-bg: rgba(148, 163, 184, 0.15);
      --toggle-hover: rgba(148, 163, 184, 0.25);
    }

    :root[data-theme="light"] {
      --bg: linear-gradient(135deg, #e0f2fe 0%, #bfdbfe 100%);
      --card-bg: rgba(255, 255, 255, 0.97);
      --card-border: rgba(148, 163, 184, 0.3);
      --text: #0f172a;
      --text-sub: #475569;
      --text-footer: #64748b;
      --btn-bg: #0ea5e9;
      --btn-color: #ffffff;
      --btn-shadow: rgba(14, 165, 233, 0.25);
      --btn-shadow-hover: rgba(14, 165, 233, 0.4);
      --toggle-bg: rgba(15, 23, 42, 0.08);
      --toggle-hover: rgba(15, 23, 42, 0.15);
    }

    * {
      transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: min(640px, calc(100% - 2rem));
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.15);
      text-align: center;
      position: relative;
    }

    .theme-toggle {
      position: absolute;
      top: 1.2rem;
      right: 1.2rem;
      background: var(--toggle-bg);
      border: none;
      border-radius: 999px;
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      color: var(--text);
      font-weight: 600;
    }

    .theme-toggle:hover {
      background: var(--toggle-hover);
    }

    h1 {
      margin: 0 0 1rem;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: -0.04em;
    }

    p {
      margin: 0 0 1.5rem;
      color: var(--text-sub);
      line-height: 1.7;
    }

    .numbers {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
      gap: 1rem;
      margin: 1.5rem 0 1rem;
    }

    .ball {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 80px;
      height: 80px;
      margin: 0 auto;
      border-radius: 50%;
      background: radial-gradient(circle at top left, #f8fafc, #38bdf8 55%, #0ea5e9 100%);
      color: #0f172a;
      font-size: 1.4rem;
      font-weight: 700;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.25);
    }

    .bonus-ball {
      background: radial-gradient(circle at top left, #fde68a, #f59e0b);
      color: #0f172a;
    }

    button.draw-btn {
      border: none;
      border-radius: 999px;
      padding: 1rem 1.8rem;
      background: var(--btn-bg);
      color: var(--btn-color);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 14px 30px var(--btn-shadow);
    }

    button.draw-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 36px var(--btn-shadow-hover);
    }

    button.draw-btn:active {
      transform: translateY(0);
    }

    .footer {
      margin-top: 1.5rem;
      color: var(--text-footer);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <button class="theme-toggle" id="themeToggle" aria-label="테마 전환">🌙 다크</button>

    <h1>로또 번호 추첨기</h1>
    <p>아래 버튼을 클릭하면 1부터 45 사이의 번호 6개와 보너스 번호를 무작위로 생성합니다.</p>

    <div class="numbers" id="lottoNumbers">
      <div class="ball">-</div>
      <div class="ball">-</div>
      <div class="ball">-</div>
      <div class="ball">-</div>
      <div class="ball">-</div>
      <div class="ball">-</div>
      <div class="ball bonus-ball">보</div>
    </div>

    <button class="draw-btn" id="drawButton">번호 추첨하기</button>

    <div class="footer">매번 다른 결과가 나타납니다. 진짜 로또와 다를 수 있습니다.</div>
  </div>

  <script>
    const drawButton = document.getElementById('drawButton');
    const lottoNumbers = document.getElementById('lottoNumbers');
    const themeToggle = document.getElementById('themeToggle');
    const html = document.documentElement;

    const saved = localStorage.getItem('theme') || 'dark';
    setTheme(saved);

    themeToggle.addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      setTheme(next);
      localStorage.setItem('theme', next);
    });

    function setTheme(theme) {
      html.setAttribute('data-theme', theme);
      themeToggle.textContent = theme === 'dark' ? '🌙 다크' : '☀️ 라이트';
    }

    function generateLottoNumbers() {
      const numbers = Array.from({ length: 45 }, (_, i) => i + 1);
      const selected = [];

      while (selected.length < 7) {
        const index = Math.floor(Math.random() * numbers.length);
        selected.push(numbers.splice(index, 1)[0]);
      }

      const mainNumbers = selected.slice(0, 6).sort((a, b) => a - b);
      const bonus = selected[6];
      return { mainNumbers, bonus };
    }

    function renderNumbers({ mainNumbers, bonus }) {
      const balls = [...mainNumbers, bonus];
      const ballElements = lottoNumbers.querySelectorAll('.ball');

      ballElements.forEach((ball, index) => {
        if (index < 6) {
          ball.textContent = balls[index];
          ball.classList.remove('bonus-ball');
        } else {
          ball.textContent = bonus;
          ball.classList.add('bonus-ball');
        }
      });
    }

    drawButton.addEventListener('click', () => {
      const lotto = generateLottoNumbers();
      renderNumbers(lotto);
    });
  </script>
</body>
</html>
