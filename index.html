<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 추첨기</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1d4ed8 100%);
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: min(640px, calc(100% - 2rem));
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.35);
      text-align: center;
    }

    h1 {
      margin: 0 0 1rem;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: -0.04em;
    }

    p {
      margin: 0 0 1.5rem;
      color: #cbd5e1;
      line-height: 1.7;
    }

    .numbers {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
      gap: 1rem;
      margin: 1.5rem 0 1rem;
    }

    .ball {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 80px;
      height: 80px;
      margin: 0 auto;
      border-radius: 50%;
      background: radial-gradient(circle at top left, #f8fafc, #38bdf8 55%, #0ea5e9 100%);
      color: #0f172a;
      font-size: 1.4rem;
      font-weight: 700;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.25);
    }

    .bonus-ball {
      background: radial-gradient(circle at top left, #fde68a, #f59e0b);
      color: #0f172a;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 1rem 1.8rem;
      background: #38bdf8;
      color: #0f172a;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 14px 30px rgba(56, 189, 248, 0.25);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 36px rgba(56, 189, 248, 0.35);
    }

    button:active {
      transform: translateY(0);
    }

    .footer {
      margin-top: 1.5rem;
      color: #94a3b8;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>로또 번호 추첨기</h1>
    <p>아래 버튼을 클릭하면 1부터 45 사이의 번호 6개와 보너스 번호를 무작위로 생성합니다.</p>

    <div class="numbers" id="lottoNumbers">
      <div class="ball">-</div>
      <div class="ball">-</div>
      <div class="ball">-</div>
      <div class="ball">-</div>
      <div class="ball">-</div>
      <div class="ball">-</div>
      <div class="ball bonus-ball">보</div>
    </div>

    <button id="drawButton">번호 추첨하기</button>

    <div class="footer">매번 다른 결과가 나타납니다. 진짜 로또와 다를 수 있습니다.</div>
  </div>

  <script>
    const drawButton = document.getElementById('drawButton');
    const lottoNumbers = document.getElementById('lottoNumbers');

    function generateLottoNumbers() {
      const numbers = Array.from({ length: 45 }, (_, i) => i + 1);
      const selected = [];

      while (selected.length < 7) {
        const index = Math.floor(Math.random() * numbers.length);
        selected.push(numbers.splice(index, 1)[0]);
      }

      const mainNumbers = selected.slice(0, 6).sort((a, b) => a - b);
      const bonus = selected[6];
      return { mainNumbers, bonus };
    }

    function renderNumbers({ mainNumbers, bonus }) {
      const balls = [...mainNumbers, bonus];
      const ballElements = lottoNumbers.querySelectorAll('.ball');

      ballElements.forEach((ball, index) => {
        if (index < 6) {
          ball.textContent = balls[index];
          ball.classList.remove('bonus-ball');
        } else {
          ball.textContent = bonus;
          ball.classList.add('bonus-ball');
        }
      });
    }

    drawButton.addEventListener('click', () => {
      const lotto = generateLottoNumbers();
      renderNumbers(lotto);
    });
  </script>
</body>
</html>
